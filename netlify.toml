# Netlify config — CLIENT site (base directory = repo root)
[build]
  # PDF.js worker được publish thành asset tĩnh để browser tải được sau SPA redirect.
  command = "yarn build && cp node_modules/pdfjs-dist/legacy/build/pdf.worker.min.js build/pdf.worker.min.js"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"
  # CRA coi warning là error khi CI=true (mặc định trên Netlify) -> tắt đi
  CI = "false"
  # Tránh out-of-memory khi build CRA lớn
  NODE_OPTIONS = "--max-old-space-size=4096"

# SPA fallback cho react-router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
