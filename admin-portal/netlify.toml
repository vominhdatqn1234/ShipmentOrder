# Netlify config — ADMIN site (base directory = admin-portal)
# admin-portal dùng chung node_modules với root, nên phải install deps ở root trước khi build
[build]
  command = "cd .. && yarn install --frozen-lockfile && cd admin-portal && yarn build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"
  CI = "false"
  NODE_OPTIONS = "--max-old-space-size=4096"

# SPA fallback cho react-router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
